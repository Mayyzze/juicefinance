{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">Reset Password</h4>
                <p class="text-muted text-center small">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Send Reset Link</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-muted small">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
