{% extends "base.html" %}
{% block title %}Backup Codes{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-3 text-success"><i class="fas fa-check-circle me-2"></i>2FA Enabled!</h4>
                <div class="alert alert-warning">
                    <strong>Save these backup codes!</strong> Each can be used once if you lose access to your authenticator app.
                </div>
                <div class="bg-dark text-light p-3 rounded font-monospace mb-4">
                    {% for code in codes %}
                    <div>{{ code }}</div>
                    {% endfor %}
                </div>
                <a href="{{ url_for('auth.profile') }}" class="btn btn-success w-100">I've saved my backup codes</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
