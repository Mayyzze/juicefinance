{% extends "base.html" %}
{% block title %}Two-Factor Authentication{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body p-4">
                <h4 class="text-center mb-4"><i class="fas fa-shield-alt text-success me-2"></i>2FA Verification</h4>
                <p class="text-muted text-center small">Enter the 6-digit code from your authenticator app.</p>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Authentication Code</label>
                        <input type="text" name="token" class="form-control form-control-lg text-center letter-spacing-wide"
                               maxlength="6" pattern="\d{6}" autofocus placeholder="000000">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">Verify</button>
                    <hr>
                    <p class="text-muted small text-center">Lost access to your authenticator?</p>
                    <div class="mb-3">
                        <label class="form-label">Backup Code</label>
                        <input type="text" name="backup_code" class="form-control" placeholder="Enter backup code">
                    </div>
                    <button type="submit" class="btn btn-outline-secondary w-100">Use Backup Code</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
