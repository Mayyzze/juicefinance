{% extends "base.html" %}
{% block title %}Admin – Feature Flags{% endblock %}
{% block content %}
<h2 class="mb-4">Feature Flags</h2>
<div class="card border-0 shadow-sm">
    <div class="list-group list-group-flush">
        {% for flag, value in flags.items() %}
        <div class="list-group-item d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <strong>{{ flag.replace('_', ' ').title() }}</strong>
                <br><small class="text-muted font-monospace">{{ flag }}</small>
            </div>
            <div class="form-check form-switch">
                <input type="checkbox" class="form-check-input" {% if value %}checked{% endif %} onchange="alert('Feature flags are managed via config in this version.')">
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
